<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wipe TEoAAAG Data</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 24px;
        }
        h1 {
            color: #58a6ff;
            margin-top: 0;
            font-size: 18px;
        }
        .section {
            margin-bottom: 20px;
            padding: 12px;
            background: #0d1117;
            border-radius: 4px;
            border-left: 2px solid #58a6ff;
        }
        .section-title {
            color: #58a6ff;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .section-content {
            font-size: 12px;
            line-height: 1.6;
            color: #8b949e;
        }
        button {
            background: #f87171;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            width: 100%;
            margin-bottom: 8px;
            transition: background 0.2s;
        }
        button:hover {
            background: #dc2626;
        }
        button.secondary {
            background: #3b82f6;
            margin-top: 12px;
        }
        button.secondary:hover {
            background: #2563eb;
        }
        .success {
            background: #0d1117;
            border: 1px solid #34d399;
            border-radius: 4px;
            padding: 12px;
            margin-top: 12px;
            color: #34d399;
            display: none;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .stat-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            font-size: 11px;
        }
        .stat-value {
            color: #58a6ff;
            font-weight: 600;
            font-size: 16px;
        }
        .stat-label {
            color: #6b7280;
            font-size: 9px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Dashboard Data Reset</h1>
        
        <div class="section">
            <div class="section-title">Current Status</div>
            <div class="section-content">
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="lsCount">0</div>
                        <div class="stat-label">localStorage items</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="idbCount">0</div>
                        <div class="stat-label">IndexedDB stores</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">What Will Be Wiped</div>
            <div class="section-content">
                ✓ Projects & chat history<br>
                ✓ Editor state<br>
                ✓ User settings (FPS, stats)<br>
                ✓ Hardware profile<br>
                ✓ First-load modals<br>
                ✓ All localStorage & IndexedDB data
            </div>
        </div>

        <button onclick="wipeAllData()">⚠️ WIPE ALL DATA</button>
        
        <div class="success" id="success">
            ✓ All dashboard data wiped successfully<br><br>
            <button class="secondary" onclick="reloadDashboard()">Reload Dashboard (Fresh Start)</button>
            <button class="secondary" style="background: #6b7280; margin-top: 4px;" onclick="closePage()">Close</button>
        </div>
    </div>

    <script>
        function checkStorageStats() {
            // Count localStorage
            let lsCount = 0;
            for (let key in localStorage) {
                if (localStorage.hasOwnProperty(key)) {
                    lsCount++;
                }
            }
            document.getElementById('lsCount').textContent = lsCount;

            // Count IndexedDB
            indexedDB.databases().then(dbs => {
                document.getElementById('idbCount').textContent = dbs.length;
            }).catch(() => {
                document.getElementById('idbCount').textContent = '0';
            });
        }

        async function wipeAllData() {
            if (!confirm('Are you sure? This will delete ALL dashboard data including:\n- All projects & chat\n- Settings\n- Hardware profile\n\nYou cannot undo this.')) {
                return;
            }

            // Clear localStorage
            const keysToWipe = [
                'projects', 'activeProject', 'customPaths', 'targetFPS', 'showStats',
                'hasSeenHardwareProfile', 'hasSeenRenderingMode', 'renderingMode',
                'homeServerHost', 'homeServerPort', 'chatHistory', 'editorState',
                'hardwareProfile'
            ];

            keysToWipe.forEach(key => {
                localStorage.removeItem(key);
            });

            // Clear any other localStorage items with TEoAAAG prefix
            for (let key in localStorage) {
                if (key.includes('TEoAAAG') || key.includes('dashboard')) {
                    localStorage.removeItem(key);
                }
            }

            // Clear IndexedDB
            try {
                const dbs = await indexedDB.databases();
                dbs.forEach(dbInfo => {
                    if (dbInfo.name.includes('TEoAAAG')) {
                        indexedDB.deleteDatabase(dbInfo.name);
                    }
                });
                indexedDB.deleteDatabase('TEoAAAG_Dashboard');
            } catch (e) {
                console.log('IndexedDB clear attempted');
            }

            // Clear any remaining caches
            if ('caches' in window) {
                const cacheNames = await caches.keys();
                cacheNames.forEach(cacheName => {
                    if (cacheName.includes('dashboard') || cacheName.includes('teoaaag')) {
                        caches.delete(cacheName);
                    }
                });
            }

            document.querySelector('button').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            checkStorageStats();
        }

        function reloadDashboard() {
            window.location.href = 'file:///E:/dashboard-app/index.html';
        }

        function closePage() {
            window.close();
        }

        // Check initial stats
        checkStorageStats();
    </script>
</body>
</html>
