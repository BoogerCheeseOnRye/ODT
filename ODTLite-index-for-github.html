<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>ODT Lite - Browser LLM</title>
    <script>
        // Check if warning was acknowledged
        if (sessionStorage.getItem('odtLiteWarningAcknowledged') !== 'true') {
            window.location.href = 'warning-lite.html';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
            font-size: 12px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: 14px;
            color: #58a6ff;
            font-weight: 600;
        }
        
        .header-stats {
            display: flex;
            gap: 12px;
            font-size: 11px;
        }
        
        .stat {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 4px 8px;
            border-radius: 3px;
            color: #58a6ff;
        }
        
        .content {
            display: flex;
            flex: 1;
            gap: 1px;
            background: #30363d;
            min-height: 0;
        }
        
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
            min-width: 0;
        }
        
        .panel-header {
            background: #161b22;
            padding: 8px 12px;
            border-bottom: 1px solid #30363d;
            font-weight: 600;
            font-size: 11px;
            color: #58a6ff;
            flex-shrink: 0;
        }
        
        .chat-responses {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        
        .message {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px;
            font-size: 11px;
            line-height: 1.5;
            max-width: 90%;
        }
        
        .message.user {
            align-self: flex-end;
            background: #1e3a4c;
            border-color: #2d5a7b;
            color: #93c5fd;
        }
        
        .message.bot {
            align-self: flex-start;
            background: #161b22;
            border-color: #30363d;
            color: #c9d1d9;
        }
        
        .message.system {
            align-self: center;
            background: #0d1117;
            border-color: #30363d;
            opacity: 0.8;
            max-width: 95%;
            font-size: 10px;
        }
        
        .message-label {
            color: #58a6ff;
            font-weight: 600;
            font-size: 10px;
            margin-bottom: 4px;
        }
        
        .message.user .message-label {
            color: #93c5fd;
        }
        
        .input-area {
            background: #161b22;
            border-top: 1px solid #30363d;
            padding: 10px;
            flex-shrink: 0;
        }
        
        textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            resize: none;
            height: 60px;
            outline: none;
        }
        
        textarea:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }
        
        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        button {
            flex: 1;
            background: #1f2937;
            color: #e5e7eb;
            border: 1px solid #374151;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #374151;
            border-color: #4b5563;
            color: #f3f4f6;
        }
        
        button:active {
            background: #111827;
        }
        
        .files-panel {
            width: 250px;
            border-right: 1px solid #30363d;
        }
        
        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .file-item {
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
            color: #8b949e;
            font-size: 11px;
            user-select: none;
        }
        
        .file-item:hover {
            background: #161b22;
            color: #58a6ff;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }
        
        @media (max-width: 768px) {
            .files-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #30363d;
                height: 200px;
            }
            
            .content {
                flex-direction: column;
            }
            
            .message {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ODT Lite</h1>
            <div class="header-stats">
                <div class="stat">Browser LLM</div>
                <div class="stat">Offline</div>
                <div class="stat" id="memory-stat">0MB</div>
            </div>
        </div>
        
        <div class="content">
            <div class="files-panel">
                <div class="panel-header">Files</div>
                <div class="file-list" id="file-list">
                    <div style="color: #6b7280; font-size: 10px; padding: 8px;">
                        Offline Mode
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-header">Chat</div>
                <div class="chat-responses" id="responses"></div>
                <div class="input-area">
                    <textarea id="input" placeholder="Ask me anything... (Ctrl+Enter to send)"></textarea>
                    <div class="buttons">
                        <button onclick="sendMessage()">Send</button>
                        <button onclick="clearChat()">Clear</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="./web-llm-fallback.js"></script>
    <script>
        let chatActive = false;
        
        async function init() {
            await window.llmFallback.webllm.initialize();
            
            addMessage('System', 'ODT Lite ready (Browser LLM)\n\nFirst message will download DistilGPT-2 (50MB) - takes 10-30 seconds.');
            
            window.addEventListener('webllm:statusChange', (e) => {
                if (e.detail.status === 'loading') {
                    addMessage('System', 'Loading model... This may take a minute.');
                } else if (e.detail.status === 'ready') {
                    addMessage('System', 'Model ready for chat');
                }
            });
            
            setInterval(updateMemory, 1000);
        }
        
        function addMessage(label, text) {
            const responses = document.getElementById('responses');
            const div = document.createElement('div');
            
            let className = 'bot';
            if (label === 'You') className = 'user';
            if (label === 'System') className = 'system';
            
            div.className = 'message ' + className;
            div.innerHTML = `<div class="message-label">${label}</div><div>${text}</div>`;
            
            responses.appendChild(div);
            responses.scrollTop = responses.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            
            if (!msg || chatActive) return;
            
            addMessage('You', msg);
            input.value = '';
            chatActive = true;
            
            try {
                addMessage('System', 'Generating response...');
                
                const response = await window.llmFallback.webllm.generate(msg, {
                    temperature: 0.7,
                    max_tokens: 200
                });
                
                if (response.success) {
                    const responses = document.getElementById('responses');
                    responses.removeChild(responses.lastChild);
                    
                    addMessage('Browser LLM', response.response);
                } else {
                    addMessage('Error', response.error);
                }
            } catch (err) {
                addMessage('Error', err.message);
            } finally {
                chatActive = false;
            }
        }
        
        function clearChat() {
            document.getElementById('responses').innerHTML = '';
            addMessage('System', 'Chat cleared');
        }
        
        function updateMemory() {
            if (performance.memory) {
                const mb = Math.round(performance.memory.usedJSHeapSize / 1048576);
                document.getElementById('memory-stat').textContent = mb + 'MB';
            }
        }
        
        document.getElementById('input').addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.shiftKey) && e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        init();
    </script>
</body>
</html>
