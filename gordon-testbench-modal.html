<!-- Gordon Testbench Modal - Insert after Optimize Modal -->
<div id="gordonTestbenchModal" class="modal">
    <div class="modal-content" style="max-width: 600px; max-height: 80vh;">
        <div class="modal-header">
            <span>🤖 Gordon Live Testbench</span>
            <button class="modal-close" onclick="closeGordonTestbench()">✕</button>
        </div>
        <div class="modal-body" style="display: flex; flex-direction: column; height: 100%;">
            <div style="margin-bottom: 12px;">
                <div class="section-label">Interaction Log</div>
                <div id="gordonLog" style="background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 10px; height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 9px; color: #58a6ff; line-height: 1.4; margin-bottom: 12px;">
                    <div style="color: #6b7280;">[Ready to start testbench...]</div>
                </div>
            </div>
            <div class="section-label">Test Controls</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px;">
                <button class="model-btn" style="background: #3b82f6; border-color: #1d4ed8; color: #fff;" onclick="runGordonAutoTest()">▶️ Auto Test (5)</button>
                <button class="model-btn" style="background: #10b981; border-color: #059669; color: #fff;" onclick="runGordonSingleTest()">➕ Send 1 Message</button>
            </div>
            <input type="text" id="gordonCustomMsg" class="modal-input" placeholder="Custom message..." style="margin-bottom: 6px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px;">
                <button class="model-btn" style="background: #f59e0b; border-color: #d97706; color: #fff;" onclick="sendGordonCustom()">📤 Send Custom</button>
                <button class="model-btn" onclick="clearGordonLog()">🗑️ Clear Log</button>
            </div>
            <div style="background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 8px; font-size: 10px; color: #8b949e; line-height: 1.5;">
                <div style="color: #58a6ff; font-weight: 600; margin-bottom: 4px;">Status</div>
                <div>Messages injected: <span id="gordonCount">0</span></div>
                <div>Mode: <span id="gordonMode">Idle</span></div>
            </div>
        </div>
    </div>
</div>

<script>
// Gordon Testbench System
let gordonTestCount = 0;
let gordonTestRunning = false;
const gordonMessages = [
    'Hello! This is Gordon from the automated testbench running live interaction tests.',
    'I am analyzing the dashboard performance and UI responsiveness in real-time.',
    'Testing the chat system with this live message injection from Gordon.',
    'All interactions are being logged and captured for the dataset collection.',
    'Testbench session complete - interaction data saved to results folder.'
];

function openGordonTestbench() {
    document.getElementById('gordonTestbenchModal').classList.add('active');
    logGordon('Testbench ready. Click Auto Test or Send Custom Message.');
}

function closeGordonTestbench() {
    document.getElementById('gordonTestbenchModal').classList.remove('active');
}

function logGordon(message, type = 'info') {
    const log = document.getElementById('gordonLog');
    const timestamp = new Date().toLocaleTimeString();
    const line = document.createElement('div');
    
    if (type === 'send') {
        line.style.color = '#34d399';
        line.textContent = `[${timestamp}] → ${message}`;
    } else if (type === 'inject') {
        line.style.color = '#58a6ff';
        line.textContent = `[${timestamp}] ↪ ${message}`;
    } else {
        line.style.color = '#6b7280';
        line.textContent = `[${timestamp}] ${message}`;
    }
    
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}

function clearGordonLog() {
    document.getElementById('gordonLog').innerHTML = '';
    gordonTestCount = 0;
    document.getElementById('gordonCount').textContent = '0';
    logGordon('Log cleared.');
}

async function runGordonAutoTest() {
    if (gordonTestRunning) return;
    gordonTestRunning = true;
    gordonTestCount = 0;
    document.getElementById('gordonMode').textContent = 'Auto Test Running';

    logGordon(`Starting auto test with ${gordonMessages.length} messages...`);

    for (let i = 0; i < gordonMessages.length; i++) {
        const msg = gordonMessages[i];
        logGordon(`Message ${i + 1}/${gordonMessages.length}`, 'send');
        
        // Inject as Gordon
        injectGordonMessage(`[GORDON AUTO] ${msg}`);
        gordonTestCount++;
        document.getElementById('gordonCount').textContent = gordonTestCount;
        
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // Simulate response
        logGordon('Dashboard received message', 'inject');
        await new Promise(resolve => setTimeout(resolve, 1000));
    }

    document.getElementById('gordonMode').textContent = 'Idle';
    gordonTestRunning = false;
    logGordon('Auto test complete!');
}

function runGordonSingleTest() {
    const msg = gordonMessages[Math.floor(Math.random() * gordonMessages.length)];
    logGordon('Sending 1 message', 'send');
    injectGordonMessage(`[GORDON SINGLE] ${msg}`);
    gordonTestCount++;
    document.getElementById('gordonCount').textContent = gordonTestCount;
    logGordon('Message injected', 'inject');
}

function sendGordonCustom() {
    const input = document.getElementById('gordonCustomMsg');
    const msg = input.value.trim();
    
    if (!msg) {
        logGordon('Please enter a message', 'info');
        return;
    }

    logGordon(`Sending custom: "${msg}"`, 'send');
    injectGordonMessage(`[GORDON CUSTOM] ${msg}`);
    gordonTestCount++;
    document.getElementById('gordonCount').textContent = gordonTestCount;
    logGordon('Message injected', 'inject');
    input.value = '';
}

function injectGordonMessage(message) {
    try {
        const chatContainer = document.getElementById('chat-responses');
        const div = document.createElement('div');
        div.className = 'response bot';
        
        const label = document.createElement('div');
        label.className = 'response-label';
        label.textContent = '🤖 Gordon';
        
        const content = document.createElement('div');
        content.textContent = message;
        
        div.appendChild(label);
        div.appendChild(content);
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    } catch (err) {
        logGordon(`Injection failed: ${err.message}`);
    }
}
</script>
